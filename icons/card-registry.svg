<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Back card (offset stack) -->
  <rect x="12" y="8" width="24" height="16" rx="2" stroke="#00ff88" stroke-width="1.5" opacity="0.3"/>
  <!-- Middle card -->
  <rect x="10" y="12" width="24" height="16" rx="2" stroke="#00ff88" stroke-width="1.5" opacity="0.55"/>
  <!-- Front card -->
  <rect x="8" y="16" width="24" height="16" rx="2" stroke="#00ff88" stroke-width="2"/>
  <!-- Checkmark on front card -->
  <polyline points="15,24 19,28 27,20" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Registry dots -->
  <circle cx="38" cy="20" r="1.5" fill="#00ff88" opacity="0.4"/>
  <circle cx="38" cy="26" r="1.5" fill="#00ff88" opacity="0.6"/>
  <circle cx="38" cy="32" r="1.5" fill="#00ff88" opacity="0.9"/>
</svg>
