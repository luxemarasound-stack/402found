<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Pickaxe head — angled geometric -->
  <path d="M14 10L24 24" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pickaxe spike left -->
  <path d="M10 8L14 10L12 14" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pickaxe spike right -->
  <path d="M18 6L14 10L16 2" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Handle -->
  <line x1="24" y1="24" x2="38" y2="38" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Gem / nugget found -->
  <polygon points="8,34 12,30 16,34 12,38" stroke="#00ff88" stroke-width="1.5" fill="#00ff88" fill-opacity="0.2" stroke-linejoin="round"/>
  <!-- Sparkle -->
  <line x1="7" y1="28" x2="7" y2="26" stroke="#00ff88" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="5" y1="29" x2="3" y2="29" stroke="#00ff88" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>
