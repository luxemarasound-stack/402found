server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets
    location ~* \.(svg|png|jpg|ico|css|js)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Serve HTML without caching
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
